name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      release_url: ${{ steps.release.outputs.release_url }}
    steps:
      - name: Ensure release exists
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            release_url="$(gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json url --jq .url)"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Code Bar ${GITHUB_REF_NAME}" \
              --notes "Building release assets... / 正在构建发布资源…" \
              --latest
            release_url="$(gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json url --jq .url)"
          fi

          echo "release_url=$release_url" >> "$GITHUB_OUTPUT"

  build-and-upload:
    name: Build ${{ matrix.label }}
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            runner: windows-latest
            bundle: msi
            target: x86_64-pc-windows-msvc
            artifact_glob: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            asset_name: code-bar-windows-x64.msi
          - label: macOS Apple Silicon
            runner: macos-15
            bundle: dmg
            target: aarch64-apple-darwin
            artifact_glob: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            asset_name: code-bar-macos-apple-silicon.dmg
          - label: macOS Intel
            runner: macos-15-intel
            bundle: dmg
            target: x86_64-apple-darwin
            artifact_glob: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            asset_name: code-bar-macos-intel.dmg
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build bundle
        shell: bash
        run: pnpm exec tauri build --bundles "${{ matrix.bundle }}" --target "${{ matrix.target }}"

      - name: Rename asset
        shell: bash
        run: |
          mkdir -p release-assets
          artifact="$(ls ${{ matrix.artifact_glob }} | head -n1)"
          if [ -z "$artifact" ]; then
            echo "No artifact found for ${{ matrix.label }}" >&2
            exit 1
          fi
          cp "$artifact" "release-assets/${{ matrix.asset_name }}"

      - name: Upload asset to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" "release-assets/${{ matrix.asset_name }}" --repo "${GITHUB_REPOSITORY}" --clobber

  publish-release:
    name: Publish Release Links
    needs:
      - prepare-release
      - build-and-upload
    runs-on: ubuntu-latest
    steps:
      - name: Resolve installer URLs
        id: links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          max_attempts=5
          for attempt in $(seq 1 "$max_attempts"); do
            if ! release_json="$(gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json assets,url 2>/dev/null)"; then
              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "Failed to resolve release ${GITHUB_REF_NAME} after ${max_attempts} attempts." >&2
                exit 1
              fi
              echo "Release not ready yet (attempt ${attempt}/${max_attempts}), retrying..."
              sleep 3
              continue
            fi

            printf '%s\n' "$release_json" > release.json
            missing_asset=""
            for asset in code-bar-windows-x64.msi code-bar-macos-apple-silicon.dmg code-bar-macos-intel.dmg; do
              if ! jq -e --arg name "$asset" '.assets[] | select(.name == $name)' release.json >/dev/null; then
                missing_asset="$asset"
                break
              fi
            done

            if [ -z "$missing_asset" ]; then
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Missing release asset after ${max_attempts} attempts: $missing_asset" >&2
              echo "Assets found:" >&2
              jq -r '.assets[].name' release.json >&2
              exit 1
            fi

            echo "Asset not ready yet (${missing_asset}) (attempt ${attempt}/${max_attempts}), retrying..."
            sleep 3
          done

          release_base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          {
            echo "windows_url=${release_base}/code-bar-windows-x64.msi"
            echo "mac_arm_url=${release_base}/code-bar-macos-apple-silicon.dmg"
            echo "mac_intel_url=${release_base}/code-bar-macos-intel.dmg"
          } >> "$GITHUB_OUTPUT"

      - name: Extract tag release notes
        id: tag_notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag_type="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}" --jq '.object.type' 2>/dev/null || true)"
          notes=""

          if [ "$tag_type" = "tag" ]; then
            tag_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}" --jq '.object.sha')"
            notes="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" --jq '.message')"
          fi

          normalized="$(printf '%s\n' "$notes" | awk -v tag="$GITHUB_REF_NAME" 'NR == 1 && $0 == tag { next } { print }')"
          normalized="$(printf '%s\n' "$normalized" | sed '/^$/N;/^\n$/D')"

          {
            echo "notes<<EOF"
            printf '%s\n' "$normalized"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_URL: ${{ needs.prepare-release.outputs.release_url }}
          WINDOWS_URL: ${{ steps.links.outputs.windows_url }}
          MAC_ARM_URL: ${{ steps.links.outputs.mac_arm_url }}
          MAC_INTEL_URL: ${{ steps.links.outputs.mac_intel_url }}
          TAG_NOTES: ${{ steps.tag_notes.outputs.notes }}
        run: |
          cat <<EOF > release-notes.md
          ## Highlights

          ${TAG_NOTES:-No additional release notes were provided for this tag.}

          ## Downloads / 下载

          - [Windows x64 MSI](${WINDOWS_URL})
          - [macOS Apple Silicon (M-series)](${MAC_ARM_URL})
          - [macOS Intel](${MAC_INTEL_URL})

          ## Release Page / 发布页

          - [All assets / 全部资源](${RELEASE_URL})
          EOF

          gh release edit "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Code Bar ${GITHUB_REF_NAME}" \
            --draft=false \
            --notes-file release-notes.md

      - name: Add workflow summary
        env:
          RELEASE_URL: ${{ needs.prepare-release.outputs.release_url }}
          WINDOWS_URL: ${{ steps.links.outputs.windows_url }}
          MAC_ARM_URL: ${{ steps.links.outputs.mac_arm_url }}
          MAC_INTEL_URL: ${{ steps.links.outputs.mac_intel_url }}
          TAG_NOTES: ${{ steps.tag_notes.outputs.notes }}
        run: |
          {
            echo "## Release Download Links / 发布下载链接"
            echo
            if [ -n "${TAG_NOTES//[[:space:]]/}" ]; then
              echo "### Highlights"
              echo
              printf '%s\n' "$TAG_NOTES"
              echo
            fi
            echo "- [Windows x64 MSI](${WINDOWS_URL})"
            echo "- [macOS Apple Silicon (M-series)](${MAC_ARM_URL})"
            echo "- [macOS Intel](${MAC_INTEL_URL})"
            echo
            echo "- [Release page / 发布页](${RELEASE_URL})"
          } >> "$GITHUB_STEP_SUMMARY"
